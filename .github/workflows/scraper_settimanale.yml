name: Bot Libri Settimanale

on:
  schedule:
    # Ogni domenica mattina alle 08:00 (orario UTC)
    - cron: '0 8 * * 0'
  # Permette di avviare il bot manualmente dalla scheda "Actions"
  workflow_dispatch: 

jobs:
  run-scrapers:
    runs-on: ubuntu-latest 

    steps:
      - name: Scarica i file del repository
        uses: actions/checkout@v4

      - name: Prepara Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa le librerie necessarie
        run: |
          python -m pip install --upgrade pip
          pip install pandas beautifulsoup4 requests nodriver

      - name: Installa Google Chrome (per lo scraper Francese)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Esegui Scraper BAM (Mercato Americano)
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python scraper_BAM.py

      - name: Esegui Scraper Decitre (Mercato Francese)
        run: python scraper_decitre.py

      - name: Salva i nuovi CSV nel repository
        run: |
          git config --global user.name 'bot-libri'
          git config --global user.email 'bot-libri@users.noreply.github.com'
          git add *.csv
          git commit -m "📚 Aggiornamento settimanale automatico CSV" || echo "Nessun nuovo libro da salvare"
          git push
