name: Aggiornamento Palinsesto TV
on:
  schedule:
    - cron: '0 8,12,16 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Installazione dipendenze
      run: pip install pandas beautifulsoup4 curl_cffi google-generativeai
    - name: Run Scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scraper_tv.py
    - name: Push Risultati
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        # 1. Salva solo il nostro prezioso file CSV
        git add ospiti_tv.csv
        git commit -m "Update TV: $(date +'%Y-%m-%d %H:%M')" || echo "Nessun nuovo dato da salvare"
        # 2. Spazza via QUALSIASI altra sporcizia o file temporaneo creato da Python
        git stash --include-untracked
        # 3. Ora la cartella è intonsa: aggiorniamo e spingiamo online!
        git pull origin main --rebase
        git push origin main
