name: Sveglia Streamlit App

on:
  schedule:
    - cron: '0 5 * * *' 
  workflow_dispatch: 

jobs:
  ping-app:
    runs-on: ubuntu-latest

    steps:
      - name: Invia visite per svegliare il server
        run: |
          # Bussiamo alla porta principale (senza seguire i redirect all'infinito)
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -s --max-time 20 "https://editoria-nvp.streamlit.app/" > /dev/null || true
          
          # Bussiamo all'ingresso di servizio (salute del server)
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -s --max-time 20 "https://editoria-nvp.streamlit.app/_stcore/health" > /dev/null || true
          
          echo "✅ Ping inviato con successo! Il server è sveglio."
