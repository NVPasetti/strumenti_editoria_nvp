name: Aggiornamento Quotidiano Scraper Internazionali

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Configurazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installazione Dipendenze e Sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        python -m pip install --upgrade pip
        pip install pandas beautifulsoup4 selenium webdriver-manager undetected-chromedriver

    - name: Esecuzione Scraper Internazionali (Include Big 5 + NYT)
      # L'americano usa Selenium puro
      run: python scraper_internazionali.py

    - name: Esecuzione Scraper Decitre
      # Il francese usa undetected-chromedriver dentro il monitor virtuale
      run: xvfb-run --auto-servernum python scraper_decitre.py

    - name: Commit e Push dei risultati
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add dati_internazionali.csv dati_decitre_scraper.csv
        git commit -m "Aggiornamento automatico dati: $(date +'%Y-%m-%d')" || true
        git pull --rebase origin main
        git push
