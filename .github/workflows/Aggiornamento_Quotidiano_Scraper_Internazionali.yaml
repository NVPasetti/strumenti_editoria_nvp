name: Aggiornamento Quotidiano Scraper Internazionali

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 1. AUTORIZZA GITHUB A SCRIVERE SUL REPOSITORY
    permissions:
      contents: write
      
    # 2. FORZA NODE 24 (Silenziatore avviso giallo)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Configurazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installazione dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install pandas beautifulsoup4 nodriver

    - name: Esecuzione Scraper Internazionali (Include Big 5 + NYT)
      run: python scraper_internazionali.py

    - name: Esecuzione Scraper Decitre
      run: python scraper_decitre.py

    - name: Commit e Push dei risultati
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add dati_internazionali.csv dati_decitre_scraper.csv
        git commit -m "Aggiornamento automatico dati: $(date +'%Y-%m-%d')" || true
        # 3. SCARICA EVENTUALI TUE MODIFICHE PRIMA DI CARICARE I CSV
        git pull --rebase origin main
        git push
