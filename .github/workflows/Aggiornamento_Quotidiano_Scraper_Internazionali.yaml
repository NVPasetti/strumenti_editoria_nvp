name: Aggiornamento Quotidiano Scraper Internazionali

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Configurazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installazione dipendenze
      run: |
        python -m pip install --upgrade pip
        # Aggiunto curl_cffi per bypassare DataDome sui siti francesi
        pip install pandas beautifulsoup4 selenium webdriver-manager curl_cffi

    - name: Esecuzione Scraper Internazionali (Include Big 5 + NYT)
      # L'americano rimane su Selenium (funziona)
      run: python scraper_internazionali.py

    - name: Esecuzione Scraper Decitre
      # Il francese ora usa richieste stealth superveloci
      run: python scraper_decitre.py

    - name: Commit e Push dei risultati
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add dati_internazionali.csv dati_decitre_scraper.csv
        git commit -m "Aggiornamento automatico dati: $(date +'%Y-%m-%d')" || true
        
        # RISOLUZIONE CONFLITTI: Disattiva il rebase e in caso di scontro fa vincere il CSV del bot (-X ours)
        git config pull.rebase false
        git pull origin main -X ours
        
        git push
