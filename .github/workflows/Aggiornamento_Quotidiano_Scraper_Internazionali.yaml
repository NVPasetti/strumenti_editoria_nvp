steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Configurazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installazione dipendenze Python
      run: |
        python -m pip install --upgrade pip
        pip install pandas beautifulsoup4 nodriver

    - name: Installazione Display Virtuale (Xvfb)
      run: sudo apt-get update && sudo apt-get install -y xvfb

    - name: Esecuzione Scraper Internazionali (Include Big 5 + NYT)
      # Avviamo lo script dentro il display virtuale
      run: xvfb-run --auto-servernum python scraper_internazionali.py

    - name: Esecuzione Scraper Decitre
      # Anche Decitre usa nodriver, applichiamo lo stesso trucco preventivamente
      run: xvfb-run --auto-servernum python scraper_decitre.py

    - name: Commit e Push dei risultati
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add dati_internazionali.csv dati_decitre_scraper.csv
        git commit -m "Aggiornamento automatico dati: $(date +'%Y-%m-%d')" || exit 0
        git push
